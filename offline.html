<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGL - بدون إنترنت</title>

    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f8fafc; /* نفس لون خلفية التطبيق */
            color: #0f172a; /* اللون الكحلي */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .offline-card {
            background: white;
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            max-width: 90%;
            width: 320px;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        h2 {
            margin: 0 0 10px;
            color: #0f172a;
            font-weight: 900;
        }

        p {
            margin: 0 0 25px;
            color: #64748b;
            font-size: 14px;
            line-height: 1.6;
        }

        .retry-btn {
            background-color: #dc2626; /* اللون الأحمر الخاص برجب */
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(220, 38, 38, 0.3);
            transition: all 0.2s;
        }

        .retry-btn:active {
            transform: scale(0.95);
            box-shadow: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <div class="offline-card">
        <div class="icon">📶❌</div>
        <h2>لا يوجد إنترنت</h2>
        <p>يبدو أنك فقدت الاتصال بالشبكة.<br>التطبيق يحتاج إلى الإنترنت لجلب أحدث البيانات والمباريات.</p>
        <button class="retry-btn" onclick="window.location.reload()">تحديث الصفحة 🔄</button>
    </div>

</body>

</html>
